<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Love Island Nigeria</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;500&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Outfit", sans-serif;
      background: linear-gradient(160deg, #ff6b35 0%, #f72585 45%, #7209b7 100%);
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 80%, rgba(255, 214, 10, 0.25) 0%, transparent 40%),
        radial-gradient(circle at 80% 20%, rgba(255, 255, 255, 0.15) 0%, transparent 35%);
      pointer-events: none;
    }

    .container {
      position: relative;
      text-align: center;
      padding: 3rem 2rem;
      max-width: 900px;
    }

    h1 {
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(2.5rem, 10vw, 5.5rem);
      letter-spacing: 0.08em;
      line-height: 1.05;
      color: #fff;
      text-shadow:
        0 4px 24px rgba(0, 0, 0, 0.25),
        0 0 60px rgba(255, 214, 10, 0.4);
      animation: fadeUp 1s ease-out both;
    }

    .accent {
      display: block;
      margin-top: 0.5rem;
      font-size: 0.35em;
      letter-spacing: 0.35em;
      color: #ffd60a;
    }

    .divider {
      width: 80px;
      height: 4px;
      margin: 2rem auto;
      background: linear-gradient(90deg, transparent, #ffd60a, transparent);
      border-radius: 2px;
      animation: fadeUp 1s 0.2s ease-out both;
    }

    p.tagline {
      font-weight: 300;
      font-size: 1.1rem;
      color: rgba(255, 255, 255, 0.85);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      animation: fadeUp 1s 0.35s ease-out both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>
      WELCOME TO LOVE ISLAND NIGERIA
      <span class="accent">★ ★ ★</span>
    </h1>
    <div class="divider"></div>
  </div>
</body>
</html>
